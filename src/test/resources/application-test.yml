spring:
  datasource:
    url: jdbc:h2:mem:cote-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: read:user, user:email

app:
  jwt:
    secret: test-secret-please-change-this-to-a-long-enough-random-string-min-256-bits
    access-ttl-seconds: 3600
    issuer: harucote-test
  oauth2:
    redirect-uri: http://localhost:3000/oauth/callback
