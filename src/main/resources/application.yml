spring:
  application:
    name: COTE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}
    issuer: harucote
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth/callback}
