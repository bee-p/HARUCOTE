spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cote}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-client-secret}
            scope: read:user, user:email

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# app.jwt.secret, app.oauth2.redirect-uri 는 application.yml 에서 환경변수로만 주입.
# 로컬에서도 명시적으로 JWT_SECRET, OAUTH2_REDIRECT_URI 를 주입해야 부팅 가능.
