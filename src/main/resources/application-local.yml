spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cote}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dummy-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dummy-client-secret}
            scope: read:user, user:email

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-please-change-this-to-a-long-enough-random-string-min-256-bits}
